      .dot-g  { fill: #a3be8c; }
      .text   { fill: #e5e9f0;   font-size: 12px; }
      .muted  { fill: #7b88a1;  font-size: 12px; }
      .accent { fill: #88c0d0; font-size: 12px; font-weight: 600; }
      .green  { fill: #a3be8c;  font-size: 12px; }
