<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 508" width="740" height="508" font-family="'JetBrains Mono','Fira Code','Cascadia Code','Symbols Nerd Font',monospace">
  <defs>
    <style>
      .bg     { fill: #2e3440; }
