# Terminal Widget Configuration
# ----------------------------------------------------------------------
# Minimum viable config — these alone produce a beautiful default widget:
#
#   username: your-github-username
#   theme: catppuccin
#   bio:
#     name: "Your Name"
#     tagline: "Developer"
#
# Everything below is optional with sensible defaults.
# ----------------------------------------------------------------------

# (REQUIRED) Your GitHub username.
username: inventory69

# Theme. Available:
#   catppuccin | nord | gruvbox | tokyo_night_storm | rose_pine | everforest
# Aliases: tokyo_night → tokyo_night_storm
theme: catppuccin

# Personal bio (optional).
bio:
  name: "Your Name"
  tagline: "Arch enjoyer • Open Source"
  website: "https://yourwebsite.com"
  links:
    - { title: "GitHub",   url: "https://github.com/your-username" }
    # - { title: "Mastodon", url: "https://fosstodon.org/@you" }

# Cosmetic "system" fields shown in the neofetch-style block.
# These are NOT auto-detected — they exist purely for personality.
fetch_fields:
  os: "Arch Linux"
  wm: "Hyprland"
  shell: "bash"
  terminal: "Kitty"
  editor: "Neovim"

# Display toggles (all optional).
display:
  show_bio:      true
  show_fetch:    true   # the neofetch-style key/value block
  show_stats:    true   # one-line repos/stars/followers/following
  show_projects: true   # top repos with language color dot
  show_palette:  true   # 8-color terminal palette bar at the bottom
  ascii_logo:    arch   # arch | cat | none
  embed_snake:   false  # inline snake.svg into terminal.svg (heavier output)
  max_projects:  5      # 1..10
