    <text class="section-title" x="10" y="22">🚀 Top Projects</text>
    <line class="section-divider" x1="10" y1="30" x2="750" y2="30"/>
    
    
    
    <text class="project-text" x="15" y="48">
      <tspan class="project-number">1.</tspan>
      <tspan class="project-name" dx="5">simple-notes-sync</tspan>
      <tspan class="project-stars" dx="10">⭐ 5</tspan>
    </text>
    <text class="project-description" x="30" y="62">Minimalistische Offline-Notiz-App mit automatis... • Kotlin</text>
    
    
    <text class="project-text" x="15" y="83">
      <tspan class="project-number">2.</tspan>
      <tspan class="project-name" dx="5">HazeBot</tspan>
      <tspan class="project-stars" dx="10">⭐ 2</tspan>
    </text>
    <text class="project-description" x="30" y="97">A feature-rich Discord bot with modular archite... • Python</text>
    
    
    <text class="project-text" x="15" y="118">
      <tspan class="project-number">3.</tspan>
      <tspan class="project-name" dx="5">voidtales-gallery</tspan>
      <tspan class="project-stars" dx="10">⭐ 2</tspan>
    </text>
    <text class="project-description" x="30" y="132">🎨 Ultra lightweight gallery written in astro / ... • CSS</text>
    
    
    <text class="project-text" x="15" y="153">
      <tspan class="project-number">4.</tspan>
      <tspan class="project-name" dx="5">Void-Bot</tspan>
      <tspan class="project-stars" dx="10">⭐ 1</tspan>
    </text>
    <text class="project-description" x="30" y="167">No description • Python</text>
    
  </g>
  
  
  
  
  
  <g class="section" transform="translate(20, 445)">
    <rect class="section-box" x="0" y="0" width="760" height="80" rx="5"/>
    
    <text class="section-title" x="10" y="22">🐍 Contribution Activity</text>
    <line class="section-divider" x1="10" y1="30" x2="750" y2="30"/>
    
    <text class="section-text secondary" x="380.0" y="52" text-anchor="middle">
      Snake animation generated separately
    </text>
    <text class="section-text small" x="380.0" y="68" text-anchor="middle">
      See README for integration with Platane/snk
    </text>
  </g>
  
  
  
  
  <text class="terminal-text" x="20" y="540">
    <tspan class="prompt-user">inventory69@github</tspan>
    <tspan class="prompt-path"> ~ </tspan>
    <tspan class="prompt-symbol">% </tspan>
    <tspan class="cursor">█</tspan>
  </text>
</svg>