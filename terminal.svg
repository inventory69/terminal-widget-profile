    <line class="section-divider" x1="10" y1="30" x2="750" y2="30"/>
    
    <text class="stat-text" x="15" y="50">
      <tspan>Public Repos</tspan>
      <tspan class="stat-value" x="680">15</tspan>
    </text>
    
    <text class="stat-text" x="15" y="70">
      <tspan>Total Stars</tspan>
      <tspan class="stat-value" x="680">10</tspan>
    </text>
    
    <text class="stat-text" x="15" y="90">
      <tspan>Followers</tspan>
      <tspan class="stat-value" x="680">3</tspan>
    </text>
  </g>
  
  
  
  
  
  
  <g class="section" transform="translate(20, 260)">
