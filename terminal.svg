<svg width="800" height="560" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    
    <style>
  /* Catppuccin Mocha Theme */
  /* https://github.com/catppuccin/catppuccin */
  
  /* Background and borders */
  .terminal-bg {
    fill: #1e1e2e;
  }
  
  .terminal-border {
    fill: none;
    stroke: #45475a;
    stroke-width: 2;
  }
  
  /* Window controls (macOS-style traffic lights) */
  .traffic-red {
    fill: #f38ba8;
  }
  
  .traffic-yellow {
    fill: #f9e2af;
  }
  
  .traffic-green {
    fill: #a6e3a1;
  }
  
  /* Window title */
  .window-title {
    fill: #6c7086;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 12px;
  }
  
  /* Terminal text */
  .terminal-text {
    fill: #cdd6f4;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 14px;
  }
  
  /* Prompt styling */
  .prompt-user {
    fill: #89b4fa;
    font-weight: bold;
  }
  
  .prompt-path {
    fill: #cdd6f4;
  }
  
  .prompt-symbol {
    fill: #a6e3a1;
  }
  
  /* ASCII art */
  .ascii-art {
    fill: #89b4fa;
    font-family: monospace;
  }
  
  /* Section boxes */
  .section-box {
    fill: #181825;
    stroke: #313244;
    stroke-width: 1;
  }
  
  /* Section titles */
  .section-title {
    fill: #89b4fa;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 14px;
    font-weight: bold;
  }
  
  .section-divider {
    stroke: #313244;
    stroke-width: 1;
  }
  
  /* Section text */
  .section-text {
    fill: #cdd6f4;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 13px;
  }
  
  .section-text.secondary {
    fill: #bac2de;
  }
  
  .section-text.small {
    font-size: 11px;
    fill: #9399b2;
  }
  
  /* Bio section */
  .bio-name {
    fill: #89b4fa;
    font-weight: bold;
  }
  
  /* Stats */
  .stat-text {
    fill: #cdd6f4;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 13px;
  }
  
  .stat-value {
    fill: #89b4fa;
    font-weight: bold;
  }
  
  /* Projects */
  .project-text {
    fill: #cdd6f4;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 13px;
  }
  
  .project-number {
    fill: #6c7086;
  }
  
  .project-name {
    fill: #89b4fa;
    font-weight: bold;
  }
  
  .project-stars {
    fill: #f9e2af;
  }
  
  .project-description {
    fill: #9399b2;
    font-family: 'JetBrains Mono', 'Hack', 'Source Code Pro', 'Fira Code', monospace;
    font-size: 11px;
  }
  
  /* Cursor animation */
  .cursor {
    fill: #cdd6f4;
    animation: blink 1s infinite;
  }
  
  @keyframes blink {
    0%, 49% {
      opacity: 1;
    }
    50%, 100% {
      opacity: 0;
    }
  }
</style>
  </defs>
  
  
  <rect class="terminal-bg" x="0" y="0" width="800" height="560" rx="10"/>
  <rect class="terminal-border" x="0" y="0" width="800" height="560" rx="10"/>
  
  
  <circle class="traffic-red" cx="20" cy="20" r="6"/>
  <circle class="traffic-yellow" cx="40" cy="20" r="6"/>
  <circle class="traffic-green" cx="60" cy="20" r="6"/>
  
  
  <text class="window-title" x="400.0" y="25" text-anchor="middle">inventory69@github</text>
  
  
  <text class="terminal-text" x="20" y="55">
    <tspan class="prompt-user">inventory69@github</tspan>
    <tspan class="prompt-path"> ~ </tspan>
    <tspan class="prompt-symbol">% </tspan>
    <tspan>neofetch</tspan>
  </text>
  
  
  
  
  
  
  
