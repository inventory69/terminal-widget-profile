name: Generate Terminal Widget

on:
  # Daily at 03:00 UTC.
  # Rationale: GitHub stats (repos/stars/followers) drift slowly. A daily
  # cadence keeps the widget fresh without burning Actions minutes — about
  # 30 runs/month vs. 120 at the previous 6-hour cadence. Users who want
  # an instant refresh after a milestone can trigger workflow_dispatch.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Prevent two manual triggers from racing each other.
concurrency:
  group: terminal-widget
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate config
        run: python scripts/validate_config.py

      - name: Generate terminal widget
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_svg.py

      # Snake animation — generated as a separate file. Embed it in your
      # README via <picture>, or set display.embed_snake: true to inline it.
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            snake.svg?palette=github-dark
            snake-light.svg?palette=github-light

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terminal.svg snake.svg snake-light.svg 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "✅ No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: update terminal widget [skip ci]"
          git push
